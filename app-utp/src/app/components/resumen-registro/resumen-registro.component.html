<ion-card class="glass-card resumen-box-card">
  <ion-card-header>
    <div class="header-row">
      <ion-icon name="clipboard-outline" color="primary" class="header-icon"></ion-icon>
      <ion-card-title>Ficha de Registro</ion-card-title>
    </div>
  </ion-card-header>
  <ion-card-content class="resumen-content">
    <ion-list lines="none">
      <ion-item class="resumen-item">
        <ion-icon name="person-circle-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <p>Desarrollador</p>
          <h3>{{ registro.nombre || 'No especificado' }}</h3>
        </ion-label>
      </ion-item>
      
      <ion-item class="resumen-item">
        <ion-icon name="mail-unread-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <p>Correo Corporativo</p>
          <h3>{{ registro.correo || 'No especificado' }}</h3>
        </ion-label>
      </ion-item>

      <ion-item class="resumen-item">
        <ion-icon name="options-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <p>Tipo de Aplicación</p>
          <h3 class="text-capitalize">{{ registro.tipoApp === 'academica' ? 'Académica' : (registro.tipoApp === 'ventas' ? 'De Ventas' : 'No especificado') }}</h3>
        </ion-label>
      </ion-item>
    </ion-list>
  </ion-card-content>
</ion-card>
